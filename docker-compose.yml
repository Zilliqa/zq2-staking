# ABOUTME: Local Docker Compose for the staking portal — dev (hot reload) + prod-like profiles
# ABOUTME: Defaults to .env.mocked (override with ENV_FILE=...); `docker compose --profile dev up` or `--profile prod up --build`
services:
  web-dev:
    profiles: ["dev"]
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file: ${ENV_FILE:-.env.mocked}
    environment:
      # Reliable hot reload for Next.js when the source is a bind mount (macOS).
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Keep the container-built node_modules instead of shadowing with the host's.
      - /app/node_modules

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: images/frontend/Dockerfile
    env_file: ${ENV_FILE:-.env.mocked}
    ports:
      - "3000:3000"
